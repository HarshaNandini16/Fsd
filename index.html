<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartBus Pro</title>

<style>
body {
    margin:0;
    font-family:'Poppins', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color:#333;
}

/* HEADER */
header {
    text-align:center;
    padding:20px;
    color:white;
    font-size:28px;
    font-weight:bold;
}

/* CONTAINER */
.container {
    width:90%;
    margin:auto;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 8px 25px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
}

/* INPUT */
input, button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
}

button {
    background:#ff6b6b;
    color:white;
    cursor:pointer;
    transition:0.3s;
}
button:hover {
    transform:scale(1.05);
    background:#ff4757;
}

/* BUS CARD */
.bus {
    display:flex;
    justify-content:space-between;
    padding:15px;
    border-radius:10px;
    margin-bottom:10px;
    background:#f1f2f6;
    transition:0.3s;
}
.bus:hover {
    transform:translateY(-5px);
}

/* SEATS */
.row {
    display:flex;
    justify-content:center;
    margin:6px;
}

.seat {
    width:40px;
    height:40px;
    margin:5px;
    border-radius:6px;
    background:#dfe4ea;
    text-align:center;
    line-height:40px;
    cursor:pointer;
    transition:0.3s;
}

.seat:hover {
    transform:scale(1.2);
}

.selected {
    background:#2ed573;
    color:white;
}

.booked {
    background:#ff4757;
    color:white;
    cursor:not-allowed;
}

.aisle { width:20px; }

/* LEGEND */
.legend {
    display:flex;
    justify-content:space-around;
    margin-top:10px;
}
.legend div {
    display:flex;
    align-items:center;
    gap:5px;
}

/* TICKET */
.ticket {
    background:#2ed573;
    color:white;
    padding:15px;
    border-radius:10px;
    animation: slideUp 0.5s ease;
}

/* HISTORY */
.hidden { display:none; }

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}
@keyframes slideUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<header>🚌 SmartBus Pro</header>

<div class="container">

<!-- LOGIN -->
<div class="card" id="auth">
    <h3>Login</h3>
    <input id="username" placeholder="Enter name">
    <button onclick="login()">Login</button>
</div>

<!-- SEARCH -->
<div class="card hidden" id="searchBox">
    <input id="from" placeholder="From">
    <input id="to" placeholder="To">
    <input type="date" id="date">
    <button onclick="searchBus()">Search</button>
</div>

<!-- BUS LIST -->
<div class="card hidden" id="busList"></div>

<!-- SEATS -->
<div class="card hidden" id="seatLayout">
    <h3>Select Seats</h3>

    <div class="legend">
        <div><span class="seat"></span> Available</div>
        <div><span class="seat selected"></span> Selected</div>
        <div><span class="seat booked"></span> Booked</div>
    </div>

    <div id="seats"></div>

    <p>Total: ₹<span id="total">0</span></p>
    <button onclick="book()">Confirm Booking</button>
</div>

<!-- TICKET -->
<div class="card hidden" id="ticket"></div>

<!-- HISTORY -->
<div class="card hidden" id="history"></div>

</div>

<script>

let user = localStorage.getItem("user");
let bookedSeats = JSON.parse(localStorage.getItem("bookedSeats")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];
let selectedSeats = [];
let price = 300;

if(user){
    auth.classList.add("hidden");
    searchBox.classList.remove("hidden");
    showHistory();
}

function login(){
    if(!username.value) return alert("Enter name");
    localStorage.setItem("user", username.value);
    location.reload();
}

function searchBus(){
    let buses = [
        {name:"Express", time:"6 AM", price:300},
        {name:"Super Deluxe", time:"10 AM", price:400},
        {name:"Sleeper", time:"10 PM", price:600}
    ];

    busList.innerHTML="<h3>Available Buses</h3>";
    busList.classList.remove("hidden");

    buses.forEach(b=>{
        let div=document.createElement("div");
        div.className="bus";
        div.innerHTML=`
            <div>
                <b>${b.name}</b><br>
                ${b.time} | ₹${b.price}
            </div>
            <button onclick="selectBus(${b.price})">Select</button>
        `;
        busList.appendChild(div);
    });
}

function selectBus(p){
    price=p;
    seatLayout.classList.remove("hidden");
    renderSeats();
}

function renderSeats(){
    seats.innerHTML="";
    for(let i=1;i<=20;i+=4){
        let row=document.createElement("div");
        row.className="row";

        for(let j=0;j<2;j++) row.appendChild(createSeat(i+j));

        let aisle=document.createElement("div");
        aisle.className="aisle";
        row.appendChild(aisle);

        for(let j=2;j<4;j++) row.appendChild(createSeat(i+j));

        seats.appendChild(row);
    }
}

function createSeat(num){
    let s=document.createElement("div");
    s.className="seat";
    s.innerText=num;

    if(bookedSeats.includes(num)) s.classList.add("booked");

    s.onclick=()=>{
        if(s.classList.contains("booked")) return;

        s.classList.toggle("selected");

        if(selectedSeats.includes(num)){
            selectedSeats = selectedSeats.filter(x=>x!==num);
        } else {
            selectedSeats.push(num);
        }

        total.innerText = selectedSeats.length * price;
    };

    return s;
}

function book(){
    if(selectedSeats.length===0) return alert("Select seats!");

    let data={
        id:"T"+Date.now(),
        from:from.value,
        to:to.value,
        seats:selectedSeats,
        total:selectedSeats.length*price
    };

    bookedSeats.push(...selectedSeats);
    localStorage.setItem("bookedSeats", JSON.stringify(bookedSeats));

    history.push(data);
    localStorage.setItem("history", JSON.stringify(history));

    showTicket(data);
    showHistory();

    selectedSeats=[];
    renderSeats();
    total.innerText=0;
}

function showTicket(d){
    ticket.classList.remove("hidden");
    ticket.innerHTML=`
    <div class="ticket">
    <h3>🎟 Ticket Confirmed</h3>
    ID: ${d.id}<br>
    ${d.from} → ${d.to}<br>
    Seats: ${d.seats.join(", ")}<br>
    Total: ₹${d.total}
    </div>`;
}

function showHistory(){
    historyEl=document.getElementById("history");
    historyEl.classList.remove("hidden");

    historyEl.innerHTML="<h3>📜 Booking History</h3>";
    history.forEach(h=>{
        historyEl.innerHTML+=`
        <p>${h.id} | ${h.from}→${h.to} | ₹${h.total}</p>`;
    });
}

</script>

</body>
</html>
